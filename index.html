<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Strawwbery Dice</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <div class="topbar-left">
        <div class="sound-control">
          <div class="sound-action">
            <button class="sound-btn" id="soundToggle">
              <span class="sound-emoji">🔊</span>
            </button>
            <span class="sound-status">Muted</span>
            <button class="spin-toggle" id="spinToggle">
              <span class="spin-label">Spin</span>
              <span class="spin-state">ON</span>
            </button>
          </div>
          <div class="sound-panel">
            <div class="sound-heading">Melody</div>
            <div class="sound-options">
              <button class="sound-option active" data-melody="garden">Garden</button>
              <button class="sound-option" data-melody="soft">Soft</button>
              <button class="sound-option" data-melody="calm">Calm</button>
            </div>
          </div>
        </div>
      </div>
      <div class="topbar-actions">
        <button class="badge-btn settings-btn" id="settingsToggle"><span class="settings-emoji">⚙️</span> Settings</button>
      <div class="settings-popover" id="settingsPopover">
        <table class="settings-table">
          <tr>
            <th>Dice count</th>
            <td>
              <div class="settings-options">
                <button class="settings-option" data-count="1">1</button>
                <button class="settings-option" data-count="2">2</button>
                <button class="settings-option" data-count="3">3</button>
                <button class="settings-option active" data-count="4">4</button>
                <button class="settings-option" data-count="5">5</button>
                <button class="settings-option" data-count="6">6</button>
              </div>
            </td>
          </tr>
          <tr>
            <th>Background theme</th>
            <td>
              <div class="settings-options">
                <button class="settings-option active" data-theme="rainbow">Rainbow</button>
                <button class="settings-option" data-theme="blue">Blue</button>
                <button class="settings-option" data-theme="green">Green</button>
                <button class="settings-option" data-theme="yellow">Yellow</button>
                <button class="settings-option" data-theme="orange">Orange</button>
                <button class="settings-option" data-theme="gold">Gold</button>
                <button class="settings-option" data-theme="silver">Silver</button>
                <button class="settings-option" data-theme="red">Red</button>
                <button class="settings-option" data-theme="sunset">Sunset</button>
                <button class="settings-option" data-theme="ocean">Ocean</button>
                <button class="settings-option" data-theme="midnight">Midnight</button>
              </div>
            </td>
          </tr>
          <tr>
            <th>Spin sound</th>
            <td>
              <div class="settings-options">
                <button class="settings-option active" data-spin="spin1">Spin 1</button>
                <button class="settings-option" data-spin="spin2">Spin 2</button>
                <button class="settings-option" data-spin="spin3">Spin 3</button>
                <button class="settings-option" data-spin="spin4">Spin 4</button>
                <button class="settings-option" data-spin="spin5">Spin 5</button>
              </div>
            </td>
          </tr>
        </table>
      </div>
        <div class="status-pill">
          <span class="status-dot"></span>
          <span class="status-text">10 online users</span>
        </div>
        <div class="country-select">
          <button class="badge-btn country-btn">
            <span class="country-label">Langue</span>
            <span class="country-code">EN</span>
          </button>
          <div class="country-popover" id="countryPopover">
            <button class="country-option">EN</button>
            <button class="country-option">RO</button>
            <button class="country-option">FR</button>
            <button class="country-option">DE</button>
            <button class="country-option">ES</button>
            <button class="country-option">IT</button>
            <button class="country-option">PT</button>
            <button class="country-option">JP</button>
          </div>
        </div>
      </div>
    </header>

    <section class="hero-card">
      <div class="hero-badge">
        <div class="badge-icon">🎲</div>
        <div class="badge-label">Strawwbery Dice</div>
      </div>
      <div class="hero-subtitle" id="subtitleText">4 color dice secure random rolls</div>
    </section>

    <main class="page-grid">
      <div class="panel-header">
        <span class="panel-title" id="possibleColorsLabel">Possible colors</span>
      </div>

      <div class="color-list" id="colorList">
        <span class="color-chip red">red</span>
        <span class="color-chip orange">orange</span>
        <span class="color-chip yellow">yellow</span>
        <span class="color-chip green">green</span>
        <span class="color-chip blue">blue</span>
        <span class="color-chip purple">purple</span>
      </div>

      <div class="dice-grid">
        <div class="dice-cell die-grey" id="die1"></div>
        <div class="dice-cell die-grey" id="die2"></div>
        <div class="dice-cell die-grey" id="die3"></div>
        <div class="dice-cell die-grey" id="die4"></div>
      </div>

      <button class="roll-btn" id="rollButton">Roll</button>
    </main>

    <footer class="page-footer">
      <span>strawwbery-dice.com</span>
      <a class="tiktok-button" href="https://www.tiktok.com/@Veyron.exe01" target="_blank" rel="noreferrer">TikTok @Veyron.exe01</a>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
